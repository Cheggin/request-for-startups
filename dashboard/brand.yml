# Brand Guidelines — Fleet Dashboard
# Generated by /startup-harness:brand-guidelines
# Referenced by all development and content agents

product:
  name: "Fleet Dashboard"
  tagline: "Agent fleet monitoring for startup-harness"
  description: "Single-page live monitoring dashboard — intervention-first, scannable from across the room"

colors:
  # Cool neutral palette — NO warm tints, NO OKLCH amber hue from retired dashboard
  background: "#FAFAFA"
  surface: "#FFFFFF"
  surface-raised: "#F5F5F5"
  border: "#E5E5E5"
  border-subtle: "#EFEFEF"

  text:
    primary: "#171717"
    secondary: "#525252"
    tertiary: "#A3A3A3"
    inverse: "#FAFAFA"

  # Status colors — high contrast for across-the-room scanning
  semantic:
    running: "#22C55E"
    running-bg: "#F0FDF4"
    idle: "#F59E0B"
    idle-bg: "#FFFBEB"
    stuck: "#EF4444"
    stuck-bg: "#FEF2F2"
    info: "#3B82F6"
    info-bg: "#EFF6FF"
    complete: "#171717"

  chart:
    sparkline-stroke: "#3B82F6"
    sparkline-fill: "#3B82F610"
    heatmap-empty: "#F5F5F5"
    heatmap-low: "#DBEAFE"
    heatmap-mid: "#93C5FD"
    heatmap-high: "#3B82F6"
    heatmap-max: "#1D4ED8"
    ring-track: "#E5E5E5"
    ring-fill: "#22C55E"
    ring-active: "#3B82F6"
    timeline-line: "#E5E5E5"
    timeline-dot-done: "#171717"
    timeline-dot-active: "#3B82F6"
    timeline-dot-pending: "#D4D4D4"

typography:
  sans:
    family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    usage: "Labels, headings, UI text"
  mono:
    family: "'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace"
    usage: "Data values, counts, pane IDs, agent output, nudge input"

  scale:
    hero: { size: "48px", weight: 700, lineHeight: 1.0, tracking: "-0.02em", font: "mono" }
    heading: { size: "20px", weight: 600, lineHeight: 1.3, tracking: "-0.01em", font: "sans" }
    subheading: { size: "14px", weight: 600, lineHeight: 1.4, tracking: "0", font: "sans" }
    body: { size: "14px", weight: 400, lineHeight: 1.5, tracking: "0", font: "sans" }
    caption: { size: "12px", weight: 400, lineHeight: 1.4, tracking: "0", font: "sans" }
    data: { size: "13px", weight: 500, lineHeight: 1.3, tracking: "0", font: "mono" }
    label: { size: "11px", weight: 500, lineHeight: 1.0, tracking: "0.05em", textTransform: "uppercase", font: "sans" }

spacing:
  unit: "4px"
  scale: [0, 4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80]
  page-padding: "24px"
  card-padding: "16px"
  section-gap: "32px"
  grid-gap: "16px"
  grid-columns: 4

border:
  radius: { none: "0px", sm: "4px", md: "8px", lg: "12px" }
  width: "1px"
  style: "solid"

shadows:
  none: "none"
  subtle: "0 1px 2px rgba(0,0,0,0.04)"

motion:
  duration-fast: "150ms"
  duration-normal: "300ms"
  easing: "cubic-bezier(0.4, 0, 0.2, 1)"
  pulse: "2s ease-in-out infinite"

voice:
  style: "Direct, active voice, second person"
  sentenceLength: "Under 15 words"
  tone: "Instrument panel — precise, quiet, trustworthy"
  vocabulary:
    prefer: ["running", "idle", "stuck", "nudge", "fleet", "chain", "phase"]
    avoid: ["smart", "intelligent", "AI-powered", "magic", "awesome", "amazing"]
  empty_states: "Plain text, no illustrations, no emojis. State the fact."
  errors: "State what happened and what to do."

component_usage:
  status_dot:
    do: "8px filled circle with semantic color. Place left of agent name."
    dont: "No icons, badges, or text labels instead of the dot."
  agent_card:
    do: "1px border, surface background, card-padding. Stuck cards get stuck-bg."
    dont: "No shadows, gradients, or decorative elements. No varying card sizes."
  nudge_input:
    do: "Monospace font, subtle border, placeholder 'Send a nudge...'. Always visible."
    dont: "Never hide behind a button or expandable."
  sparkline:
    do: "Inline SVG, 120x32px, single stroke color, subtle fill. No axes."
    dont: "No interactivity, tooltips, or animation on sparklines."
  ring_progress:
    do: "48x48px, track + fill arcs, percentage text centered."
    dont: "Max 2 colors per ring. No legends."
  hero_numbers:
    do: "48px mono weight-700, tabular-nums. Readable from 3+ meters."
    dont: "No units, labels, or decorations inline with the number."

anti_patterns:
  - "No Inter font"
  - "No sparkles icon or emoji"
  - "No !important in CSS"
  - "No left outline"
  - "No warm/amber color tints (retired dashboard)"
  - "No Bricolage Grotesque or Geist fonts (retired dashboard)"
  - "No card hover shadows or lift effects"
  - "No gradient backgrounds"
  - "No decorative illustrations for empty states"
