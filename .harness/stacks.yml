# Canonical Tech Stacks
# Every project generated by the harness uses these stacks.
# Edit this file to change defaults for all future projects.

website:
  framework: nextjs
  bundler: turbopack
  styling: tailwindcss-v4
  state:
    server: tanstack-query
    client: zustand
  language: typescript
  package_manager: npm
  component_library: null # determined per-project by design phase

backend:
  runtime: nextjs-api-routes # use Next.js API routes as primary backend
  database: convex
  authentication: null # deferred until harness is complete; skip auth screens during testing
  payments: stripe # Stripe for billing/payments; connected during onboarding, enabled when needed

deployment:
  frontend: vercel
  frontend_cli: vercel-cli # use `vercel` CLI for logs, env vars, deployments
  backend: railway
  backend_cli: railway-cli # use `railway` CLI for logs, deployments
  ci_cd: github-actions

quality:
  code_review: cubic
  testing:
    unit: vitest
    e2e: playwright
    strategy: tdd # write tests first, implement second, never simultaneously
  visual_qa: playwright-screenshots # compare against Figma design screenshots

design:
  tool: figma
  source_of_truth: figma # Figma designs are the reference for visual QA
  inspiration_dir: reference/reagan_inspirations_directory

communication:
  updates: slack # investor-style updates posted to Slack
  corrections: slack # user replies in Slack to course-correct
  channel_type: two-way # bidirectional via Slack Channel MCP

state:
  tracker: github-issues # issues + project board for all task tracking
  board_columns:
    - Backlog
    - In Progress
    - In Review
    - Done
