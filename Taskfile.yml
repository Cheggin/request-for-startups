version: '3'

tasks:
  # === Development ===
  dev:website:
    desc: Start the website template dev server
    dir: packages/website-template
    cmd: npm run dev

  dev:receiver:
    desc: Start the webhook receiver locally
    dir: packages/webhook-receiver
    cmd: bun run dev:receiver

  dev:channel:
    desc: Start the webhook MCP channel locally
    dir: packages/webhook-receiver
    cmd: bun run dev:channel

  # === Testing ===
  test:
    desc: Run all tests across all packages
    cmd: |
      for dir in packages/*/; do
        if [ -f "$dir/package.json" ]; then
          (cd "$dir" && bun test 2>/dev/null) || true
        fi
      done

  test:webhook:
    desc: Run webhook receiver tests
    dir: packages/webhook-receiver
    cmd: bun test

  test:hooks:
    desc: Run hooks package tests
    dir: packages/hooks
    cmd: bun test

  test:eval:
    desc: Run eval framework tests
    dir: packages/eval-framework
    cmd: bun test

  # === Build ===
  build:website:
    desc: Build the website template
    dir: packages/website-template
    cmd: npm run build

  build:dashboard:
    desc: Build the harness dashboard
    dir: packages/harness-dashboard
    cmd: npx next build

  # === Deploy ===
  deploy:receiver:
    desc: Deploy webhook receiver to Railway
    dir: packages/webhook-receiver
    cmd: railway up

  deploy:convex:
    desc: Deploy Convex functions
    dir: packages/webhook-receiver
    cmd: npx convex deploy

  # === Agent Panes ===
  panes:start:
    desc: Start tmux harness session with agent panes
    cmd: |
      export PATH="$HOME/.smux/bin:$PATH"
      tmux new-session -d -s harness -n main
      tmux split-window -h -t harness:main
      tmux split-window -v -t harness:main.0
      tmux split-window -v -t harness:main.1
      tmux-bridge read "%0" 1 >/dev/null 2>&1; tmux-bridge name "%0" "agent-1"
      tmux-bridge read "%1" 1 >/dev/null 2>&1; tmux-bridge name "%1" "agent-2"
      tmux-bridge read "%2" 1 >/dev/null 2>&1; tmux-bridge name "%2" "agent-3"
      tmux-bridge read "%3" 1 >/dev/null 2>&1; tmux-bridge name "%3" "agent-4"
      echo "Harness session started. Attach with: tmux attach -t harness"

  panes:kill:
    desc: Kill all harness panes
    cmd: tmux kill-session -t harness 2>/dev/null || true

  panes:list:
    desc: List all active panes
    cmd: |
      export PATH="$HOME/.smux/bin:$PATH"
      tmux-bridge list 2>/dev/null || echo "No harness session running"

  # === Evals ===
  eval:static:
    desc: Run static validation on all skills
    dir: packages/eval-framework
    cmd: bun run src/cli-static.ts

  eval:e2e:
    desc: Run E2E evals (diff-gated)
    dir: packages/eval-framework
    cmd: bun run src/cli-e2e.ts

  eval:judge:
    desc: Run LLM-as-judge evals
    dir: packages/eval-framework
    cmd: bun run src/cli-judge.ts

  eval:all:
    desc: Run all eval tiers (static, e2e, judge)
    cmds:
      - task: eval:static
      - task: eval:e2e
      - task: eval:judge
